<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trends - Briefly</title>
    <link rel="stylesheet" href="../CSS/Navigation.css">
    <link rel="stylesheet" href="../CSS/Movies.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        .video-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .video-item {
            background: #222;
            padding: 15px;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }

        .video-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(167, 53, 32, 0.3);
        }

        .video-anchor {
            display: block;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
        }

        .video-anchor img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .play-button-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(167, 53, 32, 0.85);
            border-radius: 50%;
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .play-button-overlay i {
            color: white;
            font-size: 20px;
            margin-left: 4px;
        }

        .play-button-overlay .fa-instagram {
            margin-left: 0;
        }

        .video-anchor:hover .play-button-overlay {
            background-color: #a73520;
            transform: translate(-50%, -50%) scale(1.1);
        }

        .video-title {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            text-align: center;
        }

        .comment-section {
            background: #222;
            padding: 30px;
            border-radius: 10px;
            max-width: 800px;
            margin: 40px auto;
        }

        .comment-form input, .comment-form textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #151515;
            color: white;
        }

        .comment-form input:focus, .comment-form textarea:focus {
            outline: none;
            border-color: #a73520;
        }

        .submit-btn {
            background-color: #a73520;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }

        .submit-btn:hover { background-color: #ce4228; }

        .section-title {
            font-size: 28px;
            margin: 30px 0;
            color: #a73520;
            border-bottom: 2px solid #a73520;
            padding-bottom: 10px;
            text-shadow: 0 0 10px rgba(167, 53, 32, 0.3);
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #777;
            font-size: 14px;
            border-top: 1px solid #222;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="navbar-container">
            <div class="logo-container">
                <a href="index.html" style="text-decoration: none; color: inherit;">
                    <h1 class="logo">Briefly</h1>
                </a>
            </div>
            <div class="menu-container">
                <ul class="menu-list">
                    <li class="menu-list-item"><a href="index.html">Home</a></li>
                    <li class="menu-list-item"><a href="movies.html">Movies</a></li>
                    <li class="menu-list-item"><a href="series.html">Series</a></li>
                    <li class="menu-list-item"><a href="popular.html">Popular</a></li>
                    <li class="menu-list-item active"><a href="trends.html">Trends</a></li>
                </ul>
            </div>
            <div class="profile-container">
                <img class="profile-picture" src="../img/ph.jpg" alt="Profile">
                <div class="profile-text-container">
                    <span class="profile-text">Profile</span>
                    <i class="fa-solid fa-angle-down"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="container">

                <div class="video-item">
                    <a href="https://www.youtube.com/watch?v=bwELoBJwo8U" target="_blank" class="video-anchor">

                        <div class="play-button-overlay">
                            <i class="fa-solid fa-play"></i>

        <section id="trending-instagram">

                        <img src="https://i.ytimg.com/vi/bwELoBJwo8U/maxresdefault.jpg" alt="Behind the Scenes">
                        <div class="play-button-overlay">
                            <i class="fa-brands fa-instagram"></i>

                </div>
                <div class="video-item">

        <section class="comment-section">
            <h2 class="section-title" style="text-align: center; border: none;">Join the Discussion</h2>
            <form class="comment-form">
                <input type="text" placeholder="Your Name" required>
                <textarea placeholder="What are your thoughts on today's trends?" rows="4" required></textarea>
                <button type="submit" class="submit-btn">POST COMMENT</button>
            </form>
        </section>
    </div>
