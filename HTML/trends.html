<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trends - Briefly</title>
    <link rel="stylesheet" href="../CSS/Navigation.css">
    <link rel="stylesheet" href="../CSS/Movies.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* Unified Trends Styles - Now in Red */
        .video-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .video-item {
            background: #222;
            padding: 15px;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }

        .video-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(167, 53, 32, 0.3);
        }

        iframe {
            width: 100%;
            height: 200px;
            border-radius: 8px;
            border: none;
        }

        .video-title {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            text-align: center;
        }

        .comment-section {
            background: #222;
            padding: 30px;
            border-radius: 10px;
            max-width: 800px;
            margin: 40px auto;
        }

        .comment-form input, .comment-form textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #151515;
            color: white;
        }

        .comment-form input:focus, .comment-form textarea:focus {
            outline: none;
            border-color: #a73520;
        }

        .submit-btn {
            background-color: #a73520;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background-color: #ce4228; /* Slightly lighter red for hover */
        }

        .section-title {
            font-size: 28px;
            margin: 30px 0;
            color: #a73520; /* The Briefly Red */
            border-bottom: 2px solid #a73520;
            padding-bottom: 10px;
            text-shadow: 0 0 10px rgba(167, 53, 32, 0.3);
        }
        
        footer {
            text-align: center;
            padding: 40px;
            color: #777;
            font-size: 14px;
            border-top: 1px solid #222;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="navbar-container">
            <div class="logo-container">
                <a href="index.html" style="text-decoration: none; color: inherit;">
                    <h1 class="logo">Briefly</h1>
                </a>
            </div>
            <div class="menu-container">
                <ul class="menu-list">
                    <li class="menu-list-item"><a href="index.html">Home</a></li>
                    <li class="menu-list-item"><a href="movies.html">Movies</a></li>
                    <li class="menu-list-item"><a href="series.html">Series</a></li>
                    <li class="menu-list-item"><a href="popular.html">Popular</a></li>
                    <li class="menu-list-item active"><a href="trends.html">Trends</a></li>
                </ul>
            </div>
            <div class="profile-container">
                <img class="profile-picture" src="../img/ph.jpg" alt="Profile">
                <div class="profile-text-container">
                    <span class="profile-text">Profile</span>
                    <i class="fa-solid fa-angle-down"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <section id="trending-youtube">
            <h2 class="section-title">Trending YouTube Videos</h2>
            <div class="video-container">
                <div class="video-item">
                    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
                    <p class="video-title">Epic Movie Breakdown</p>
                </div>
                <div class="video-item">
                    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
                    <p class="video-title">Top 10 CGI Moments</p>
                </div>
                <div class="video-item">
                    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
                    <p class="video-title">Director's Secrets</p>
                </div>
            </div>
        </section>

        <section id="trending-instagram">
            <h2 class="section-title">Trending Reels</h2>
            <div class="video-container">
                <div class="video-item">
                    <iframe src="https://www.instagram.com/p/CK_9H_7F_0X/embed" allowfullscreen></iframe>
                    <p class="video-title">Behind the Scenes</p>
                </div>
                <div class="video-item">
                    <iframe src="https://www.instagram.com/p/CK_9H_7F_0X/embed" allowfullscreen></iframe>
                    <p class="video-title">Red Carpet Fashion</p>
                </div>
                <div class="video-item">
                    <iframe src="https://www.instagram.com/p/CK_9H_7F_0X/embed" allowfullscreen></iframe>
                    <p class="video-title">Movie Set Magic</p>
                </div>
            </div>
        </section>

        <section class="comment-section">
            <h2 class="section-title" style="text-align: center; border: none;">Join the Discussion</h2>
            <form class="comment-form">
                <input type="text" placeholder="Your Name" required>
                <textarea placeholder="What are your thoughts on today's trends?" rows="4" required></textarea>
                <button type="submit" class="submit-btn">POST COMMENT</button>
            </form>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 Briefly. All cinematic rights reserved.</p>
    </footer>

    <script src="../Funksionet/main.js"></script>
</body>

</html>
